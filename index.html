<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ちー・よっくん 🌟 ToDo</title>
    <style>
        body { margin: 0; font-family: sans-serif; text-align: center; background: #F0F8FF; overflow-x: hidden; }
        #top-area { background: #C8E6C9; padding: 10px; border-bottom: 3px solid #81C784; }
        #clock { font-size: 80px; font-weight: bold; color: #2E7D32; }
        #bottom-area { display: flex; height: calc(100vh - 120px); }
        .player-area { flex: 1; padding: 10px; display: flex; flex-direction: column; align-items: center; }
        #yokkun-area { border-right: 2px dashed #999; }
        .player-name { font-size: 22px; font-weight: bold; margin-bottom: 5px; }
        .score-display { font-size: 18px; color: #555; margin-bottom: 5px; }
        .timer-display { font-size: 26px; font-weight: bold; color: #D32F2F; margin-bottom: 10px; }
        .task-title { font-size: 18px; font-weight: bold; min-height: 2.5em; }
        .img-box { height: 130px; display: flex; align-items: center; justify-content: center; margin-bottom: 20px; }
        .treasure-img { width: 140px; transition: width 0.3s ease; }
        .btn { background: #8BC34A; color: white; border: none; padding: 15px 30px; font-size: 24px; font-weight: bold; border-radius: 50px; box-shadow: 0 5px #689F38; cursor: pointer; }
        .btn:active { transform: translateY(4px); box-shadow: 0 2px #689F38; }
        .btn:disabled { background: #CCC; box-shadow: 0 5px #999; cursor: default; }
        .reset-btn { margin-top: 15px; background: none; border: none; color: #AAA; font-size: 10px; text-decoration: underline; }
    </style>
</head>
<body>
    <div id="top-area"><div id="clock">00:00:00</div></div>
    <div id="bottom-area">
        <div class="player-area" id="chee-area">
            <div class="player-name">🌟 ちー 🌟</div>
            <div class="score-display">トータル: <span id="chee-total">0</span></div>
            <div class="timer-display" id="chee-timer">00:00</div>
            <div class="task-title" id="chee-task">読み込み中...</div>
            <div class="img-box"><img id="chee-img" class="treasure-img" src="data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAJAAAACQCAMAAADf6Iq9AAAAeFBMVEUAAAD///8AnP8Anf8Anv8An/8AoP8AoP8AoP8AoP8AoP8AoP8AoP8AoP8AoP8AoP8AoP8AoP8AoP8AoP8AoP8AoP8AoP8AoP8AoP8AoP8AoP8AoP8AoP8AoP8AoP8AoP8AoP8AoP8AoP8AoP8AoP8AoP8AoP8AoP+n4X+IAAAAI3RSTlMAAQIDBAUGBwgJCgsMDQ660p8fICEiIyQlJicoKSorLC0uMTS65k8AAAAXSURBVHja7cEBDAMAAACQp/uXNqf2mAMAwK8BaY8AAb8AtfMAAAAASUVORK5CYII="></div>
            <button class="btn" id="chee-btn" onclick="done('chee')">できた！</button>
            <button class="reset-btn" onclick="resetPoints('chee')">ポイントを0にする</button>
        </div>
        <div class="player-area" id="yokkun-area">
            <div class="player-name">🌟 よっくん 🌟</div>
            <div class="score-display">トータル: <span id="yokkun-total">0</span></div>
            <div class="timer-display" id="yokkun-timer">00:00</div>
            <div class="task-title" id="yokkun-task">読み込み中...</div>
            <div class="img-box"><img id="yokkun-img" class="treasure-img" src="data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAJAAAACQCAMAAADf6Iq9AAAAeFBMVEUAAAD///8AnP8Anf8Anv8An/8AoP8AoP8AoP8AoP8AoP8AoP8AoP8AoP8AoP8AoP8AoP8AoP8AoP8AoP8AoP8AoP8AoP8AoP8AoP8AoP8AoP8AoP8AoP8AoP8AoP8AoP8AoP8AoP8AoP8AoP8AoP8AoP8AoP8AoP+n4X+IAAAAI3RSTlMAAQIDBAUGBwgJCgsMDQ660p8fICEiIyQlJicoKSorLC0uMTS65k8AAAAXSURBVHja7cEBDAMAAACQp/uXNqf2mAMAwK8BaY8AAb8AtfMAAAAASUVORK5CYII="></div>
            <button class="btn" id="yokkun-btn" onclick="done('yokkun')">できた！</button>
            <button class="reset-btn" onclick="resetPoints('yokkun')">ポイントを0にする</button>
        </div>
    </div>
    <script>
        const list = [
            { t: "1) おきる！！", s: 300 },
            { t: "2) トイレ・おきがえ", s: 600 },
            { t: "3) ごはん たべる", s: 1200 },
            { t: "4) はみがき・かおあらい", s: 300 },
            { t: "5) じゅんび（カバン）", s: 300 },
            { t: "🌟 ぜんぶ かんりょう！", s: 1 }
        ];
        let state = {
            chee: { idx: 0, left: 300, total: 0 },
            yokkun: { idx: 0, left: 300, total: 0 }
        };
        function updateClock() {
            const now = new Date();
            document.getElementById('clock').innerText = now.toTimeString().split(' ')[0];
        }
        function save() {
            localStorage.setItem('kids_todo_v2', JSON.stringify(state));
        }
        function load() {
            const saved = localStorage.getItem('kids_todo_v2');
            if (saved) {
                state = JSON.parse(saved);
                document.getElementById('chee-total').innerText = state.chee.total;
                document.getElementById('yokkun-total').innerText = state.yokkun.total;
            }
            render('chee'); render('yokkun');
        }
        function render(pKey) {
            const p = state[pKey];
            document.getElementById(pKey + '-task').innerText = list[p.idx].t;
            const m = Math.floor(p.left / 60);
            const s = p.left % 60;
            document.getElementById(pKey + '-timer').innerText = `${m}:${s < 10 ? '0' : ''}${s}`;
            document.getElementById(pKey + '-img').style.width = (140 * (p.left / list[p.idx].s)) + "px";
            if (p.idx >= list.length - 1) {
                document.getElementById(pKey + '-btn').innerText = "あしたもがんばる！";
                document.getElementById(pKey + '-btn').disabled = true;
                document.getElementById(pKey + '-img').style.width = "140px";
            }
        }
        function done(pKey) {
            const p = state[pKey];
            if (p.idx < list.length - 1) {
                p.total += 10;
                document.getElementById(pKey + '-total').innerText = p.total;
                p.idx++;
                p.left = list[p.idx].s;
                save();
                render(pKey);
            }
        }
        function resetPoints(pKey) {
            if (confirm(pKey + ' のポイントをリセットしますか？')) {
                state[pKey].total = 0;
                document.getElementById(pKey + '-total').innerText = 0;
                save();
            }
        }
        setInterval(() => {
            updateClock();
            ['chee', 'yokkun'].forEach(pKey => {
                if (state[pKey].left > 0 && state[pKey].idx < list.length - 1) {
                    state[pKey].left--;
                    render(pKey);
                }
            });
        }, 1000);
        window.onload = load;
    </script>
</body>
</html>
