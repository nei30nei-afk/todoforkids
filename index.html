<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ちー・よっくん 🌟 冒険ガチャ</title>
    <style>
        html, body { 
            margin: 0; padding: 0; width: 100%; height: 100%; 
            overflow: hidden; font-family: 'Hiragino Kaku Gothic ProN', sans-serif; background: #FFF9C4;
            touch-action: manipulation;
        }
        body { display: flex; flex-direction: column; align-items: center; justify-content: center; }

        /* ガチャ本体の見た目 */
        #gacha-machine {
            width: 300px; height: 450px; background: #F44336; border-radius: 40px 40px 20px 20px;
            border: 8px solid #B71C1C; position: relative; display: flex; flex-direction: column; align-items: center;
        }
        #glass-window {
            width: 240px; height: 180px; background: #E1F5FE; border: 5px solid #01579B;
            border-radius: 20px; margin-top: 30px; position: relative; overflow: hidden;
            display: flex; flex-wrap: wrap; justify-content: center; align-content: center;
        }
        .mini-capsule { width: 30px; height: 30px; border-radius: 50%; margin: 2px; }

        /* レバー */
        #lever-container {
            width: 100px; height: 100px; background: #9E9E9E; border-radius: 50%;
            margin-top: 40px; border: 5px solid #616161; display: flex; align-items: center; justify-content: center;
            cursor: pointer; transition: transform 0.5s;
        }
        #lever-handle { width: 80px; height: 20px; background: #424242; border-radius: 10px; }
        .lever-spin { transform: rotate(360deg); }

        /* 出口 */
        #exit-hole {
            width: 80px; height: 60px; background: #333; border-radius: 10px 10px 0 0;
            position: absolute; bottom: 20px;
        }

        /* 浮き出てくるカプセル */
        #result-capsule {
            display: none; position: absolute; width: 150px; height: 150px;
            border-radius: 50%; z-index: 200; cursor: pointer;
            box-shadow: inset -10px -10px 20px rgba(0,0,0,0.2);
            animation: bounce 0.6s infinite alternate;
        }

        @keyframes bounce { from { transform: translateY(0) scale(1); } to { transform: translateY(-20px) scale(1.05); } }

        /* チケット表示画面 */
        #ticket-screen {
            display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.8);
            z-index: 300; flex-direction: column; align-items: center; justify-content: center;
            color: white; text-align: center;
        }
        #ticket-card {
            width: 85%; max-width: 400px; background: white; color: #333;
            padding: 30px; border-radius: 20px; border: 10px dashed #FF9800;
            position: relative; overflow: hidden;
        }
        .rare-sparkle { animation: pika 0.5s infinite; }
        .srare-sparkle { animation: pika-strong 0.3s infinite; box-shadow: 0 0 50px #FFF176; }

        @keyframes pika { 0%, 100% { background: white; } 50% { background: #FFF9C4; } }
        @keyframes pika-strong { 0%, 100% { background: #FFD54F; transform: scale(1); } 50% { background: #FFF176; transform: scale(1.05); } }

        .btn-close { margin-top: 30px; padding: 15px 40px; font-size: 20px; background: #4CAF50; color: white; border: none; border-radius: 50px; cursor: pointer; }

        /* 元のToDoに戻るボタン（隠し機能的） */
        #back-to-todo { position: absolute; top: 10px; left: 10px; padding: 5px 10px; font-size: 12px; }
    </style>
</head>
<body>

    <h1 style="color:#D84315; margin-bottom:10px;">✨ ごほうびガチャ ✨</h1>
    <p id="player-msg" style="font-weight:bold;"></p>

    <div id="gacha-machine">
        <div id="glass-window" id="capsule-container">
            <script>
                for(let i=0; i<20; i++) {
                    const colors = ['#FF5252','#448AFF','#4CAF50','#FFEB3B','#E040FB'];
                    document.write(`<div class="mini-capsule" style="background:${colors[i%5]}"></div>`);
                }
            </script>
        </div>
        <div id="lever-container" onclick="spinLever()">
            <div id="lever-handle"></div>
        </div>
        <div id="exit-hole"></div>
        
        <div id="result-capsule" onclick="openCapsule()"></div>
    </div>

    <div id="ticket-screen">
        <h2 id="rare-label" style="font-size: 30px;"></h2>
        <div id="ticket-card">
            <p style="font-size: 14px; color: #666;">☆☆ 冒険のごほうびチケット ☆☆</p>
            <h1 id="prize-name" style="font-size: 32px; margin: 20px 0;"></h1>
            <p id="prize-desc" style="font-size: 18px; font-weight: bold;"></p>
        </div>
        <button class="btn-close" onclick="closeGacha()">またあした！</button>
    </div>

    <script>
        // ガチャの中身と確率
        const prizes = [
            { n: "YouTube 10分延長", r: "ノーマル", p: 60, c: "#81C784" },
            { n: "デザートふやせる", r: "ノーマル", p: 60, c: "#81C784" },
            { n: "代わりにやるよ", r: "ノーマル", p: 60, c: "#81C784" },
            { n: "すきなジュース", r: "レア", p: 30, c: "#4FC3F7" },
            { n: "ばんごはんカレー", r: "レア", p: 30, c: "#4FC3F7" },
            { n: "かか10分ひとりじめ", r: "レア", p: 30, c: "#4FC3F7" },
            { n: "100円ショップお買い物", r: "Sレア", p: 10, c: "#FFD54F" }
        ];

        let isSpinning = false;

        function spinLever() {
            if(isSpinning) return;
            isSpinning = true;
            
            // レバー回転
            document.getElementById('lever-container').classList.add('lever-spin');
            
            setTimeout(() => {
                // カプセル出現
                const cap = document.getElementById('result-capsule');
                const randomColor = ['#FF5252','#448AFF','#4CAF50','#FFEB3B'][Math.floor(Math.random()*4)];
                cap.style.background = randomColor;
                cap.style.display = 'block';
                cap.style.top = '300px'; // 出口付近
                
                // ガチャ本体を少し揺らす
                document.getElementById('gacha-machine').animate([
                    { transform: 'translateX(0)' },
                    { transform: 'translateX(5px)' },
                    { transform: 'translateX(-5px)' },
                    { transform: 'translateX(0)' }
                ], { duration: 100, iterations: 5 });

            }, 600);
        }

        function openCapsule() {
            const cap = document.getElementById('result-capsule');
            cap.style.display = 'none';
            document.getElementById('lever-container').classList.remove('lever-spin');
            
            // 抽選
            const rand = Math.random() * 100;
            let pool = [];
            if(rand < 10) pool = prizes.filter(x => x.r === "Sレア");
            else if(rand < 40) pool = prizes.filter(x => x.r === "レア");
            else pool = prizes.filter(x => x.r === "ノーマル");
            
            // 抽選結果が空にならないよう保険
            if(pool.length === 0) pool = [prizes[0]];
            const finalPrize = pool[Math.floor(Math.random() * pool.length)];

            // 結果表示
            const screen = document.getElementById('ticket-screen');
            const card = document.getElementById('ticket-card');
            const label = document.getElementById('rare-label');
            
            screen.style.display = 'flex';
            document.getElementById('prize-name').innerText = finalPrize.n;
            label.innerText = finalPrize.r + "！！";
            
            // 演出リセット
            card.className = "";
            label.style.color = "white";

            if(finalPrize.r === "レア") {
                card.classList.add('rare-sparkle');
                label.style.color = "#4FC3F7";
                card.style.borderColor = "#4FC3F7";
            } else if(finalPrize.r === "Sレア") {
                card.classList.add('srare-sparkle');
                label.style.color = "#FFD54F";
                card.style.borderColor = "#FFD54F";
                label.innerText = "🌟 超レア 🌟";
            } else {
                card.style.borderColor = "#FF9800";
            }
        }

        function closeGacha() {
            // 元のToDoページをリロードして戻る
            location.reload();
        }

        window.onload = () => {
            // URLから誰が回したか取得（ToDoからの連携用）
            const urlParams = new URLSearchParams(window.location.search);
            const user = urlParams.get('p') === 'chee' ? 'ちー' : 'よっくん';
            document.getElementById('player-msg').innerText = user + "の 5000ptごほうび！";
        };
    </script>
</body>
</html>
