<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, orientation=landscape">
    <title>ちー・よっくん 🌟 冒険ToDo</title>
    <style>
        body { margin: 0; font-family: sans-serif; background: #E8F5E9; display: flex; flex-direction: column; height: 100vh; overflow: hidden; text-align: center; }
        #top-area { flex: 0.8; background: #C8E6C9; border-bottom: 5px solid #81C784; display: flex; flex-direction: column; justify-content: center; }
        #clock { font-size: 40px; font-weight: bold; color: #1B5E20; }
        #bottom-area { flex: 2; display: flex; flex-direction: row; }
        .player-area { flex: 1; display: flex; flex-direction: column; padding: 10px; border-right: 3px solid #81C784; position: relative; transition: 0.5s; }
        #yokkun-area { border-right: none; }
        .player-name { font-size: 24px; font-weight: bold; background: rgba(255,255,255,0.7); border-radius: 15px; margin-bottom: 5px; padding: 5px; }
        .task-title { font-size: 20px; font-weight: bold; height: 3em; display: flex; align-items: center; justify-content: center; line-height: 1.2; color: #2E7D32; }
        .timer-display { font-size: 22px; color: #D32F2F; font-weight: bold; margin: 5px 0; background: white; border-radius: 10px; display: inline-block; padding: 2px 15px; }
        .score-display { font-size: 18px; color: #388E3C; font-weight: bold; }
        .img-box { height: 140px; display: flex; align-items: center; justify-content: center; }
        .treasure-img { width: 180px; transition: 0.3s ease-out; }
        .btn-done { background: #8BC34A; color: white; border: none; padding: 12px 40px; font-size: 26px; font-weight: bold; border-radius: 50px; box-shadow: 0 5px #689F38; cursor: pointer; }
        .btn-done:active { transform: translateY(3px); box-shadow: none; }
        .clear-screen { background: linear-gradient(135deg, #FFEB3B, #FF9800) !important; color: #4E342E; }
        @keyframes pika { 0%, 100% { opacity: 1; transform: scale(1); } 50% { opacity: 0.8; transform: scale(1.05); } }
        .pika-points { font-size: 26px; font-weight: bold; animation: pika 0.8s infinite; color: #E65100; margin-top: 10px; }
    </style>
</head>
<body>

    <div id="top-area">
        <div id="clock">00:00:00</div>
    </div>

    <div id="bottom-area">
        <div id="chee-area" class="player-area">
            <div class="player-name">🌟 ちー 🌟</div>
            <div id="chee-score" class="score-display">ポイント: 0</div>
            <div><span id="chee-timer" class="timer-display">--:--</span></div>
            <div id="chee-content">
                <div id="chee-title" class="task-title">準備中...</div>
                <div class="img-box"><img id="chee-img" class="treasure-img" src="https://i.imgur.com/doOjZrX.png"></div>
                <button class="btn-done" onclick="nextTask('chee')">できた！</button>
            </div>
            <div id="chee-congrats" style="display:none;">
                <h2 style="font-size:32px; margin:10px 0;">👑 クリア！ 👑</h2>
                <div id="chee-final-points" class="pika-points">0 pt</div>
                <p>すごいぞ！ちー！</p>
                <button onclick="location.reload()" style="margin-top:10px; font-size:12px; opacity:0.6;">またあしたね！</button>
            </div>
        </div>

        <div id="yokkun-area" class="player-area">
            <div class="player-name">🌟 よっくん 🌟</div>
            <div id="yokkun-score" class="score-display">ポイント: 0</div>
            <div><span id="yokkun-timer" class="timer-display">--:--</span></div>
            <div id="yokkun-content">
                <div id="yokkun-title" class="task-title">準備中...</div>
                <div class="img-box"><img id="yokkun-img" class="treasure-img" src="https://i.imgur.com/doOjZrX.png"></div>
                <button class="btn-done" onclick="nextTask('yokkun')">できた！</button>
            </div>
            <div id="yokkun-congrats" style="display:none;">
                <h2 style="font-size:32px; margin:10px 0;">👑 クリア！ 👑</h2>
                <div id="yokkun-final-points" class="pika-points">0 pt</div>
                <p>さすが！よっくん！</p>
                <button onclick="location.reload()" style="margin-top:10px; font-size:12px; opacity:0.6;">またあしたね！</button>
            </div>
        </div>
    </div>

    <script>
        const data = {
            chee: [
                {t: "1）おきる！！", s: 600}, {t: "2）おしっこにいく！！", s: 300},
                {t: "3）てをあらう！！", s: 120}, {t: "4）ごはん！！", s: 900},
                {t: "5）うんち！！", s: 480}, {t: "6）きがえる！！", s: 300},
                {t: "7）すー！はー！！", s: 120}, {t: "8）はをみがく！！", s: 300},
                {t: "9）めがね！！！", s: 120}, {t: "10）うわぎ！！！", s: 180}
            ],
            yokkun: [
                {t: "1）おきる！！", s: 600}, {t: "2）おしっこ！！", s: 300},
                {t: "3）手をあらう！！", s: 120}, {t: "4）ごはん！！", s: 900},
                {t: "5）うんち！！", s: 600}, {t: "6）きがえる！！", s: 180},
                {t: "7）はをみがく！！", s: 300}, {t: "8）すいとう！！<br>きゅうしょくぶくろ！！", s: 120},
                {t: "9）はんかち！うわぎ！<br>ぼうし！！", s: 180}, {t: "10）ランドセル！！", s: 120}
            ]
        };

        let players = {
            chee: { idx: 0, left: 0, total: 0, points: 0, tid: null },
            yokkun: { idx: 0, left: 0, total: 0, points: 0, tid: null }
        };

        function updateClock() { document.getElementById('clock').innerText = new Date().toLocaleTimeString('ja-JP'); }
        setInterval(updateClock, 1000);

        function startTask(pKey) {
            let p = players[pKey];
            let taskList = data[pKey];
            if(p.tid) clearInterval(p.tid);
            
            p.total = p.left = taskList[p.idx].s;
            document.getElementById(`${pKey}-title`).innerHTML = taskList[p.idx].t;
            
            p.tid = setInterval(() => {
                p.left--;
                if(p.left < 0) p.left = 0;
                
                const m = Math.floor(p.left/60), s = p.left%60;
                document.getElementById(`${pKey}-timer`).innerText = `${m}:${s.toString().padStart(2,'0')}`;
                
                const r = p.left / p.total;
                const el = document.getElementById(`${pKey}-img`);
                if(r > 0.75) el.style.width = '180px';
                else if(r > 0.5) el.style.width = '135px';
                else if(r > 0.25) el.style.width = '90px';
                else if(r > 0) el.style.width = '45px';
                else { el.style.width = '0px'; clearInterval(p.tid); }
            }, 1000);
        }

        function nextTask(pKey) {
            let p = players[pKey];
            if(p.left > 0) p.points += p.left;
            document.getElementById(`${pKey}-score`).innerText = `ポイント: ${p.points}`;

            p.idx++;
            if(p.idx < data[pKey].length) {
                document.getElementById(`${pKey}-img`).style.width = '180px';
                startTask(pKey);
            } else {
                clearInterval(p.tid);
                document.getElementById(`${pKey}-content`).style.display = 'none';
                document.getElementById(`${pKey}-timer`).style.display = 'none';
                document.getElementById(`${pKey}-congrats`).style.display = 'block';
                document.getElementById(`${pKey}-area`).classList.add('clear-screen');
                document.getElementById(`${pKey}-final-points`).innerText = `${p.points} ポイント獲得！！`;
            }
        }

        updateClock();
        startTask('chee');
        startTask('yokkun');
    </script>
</body>
</html>
