<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ToDo</title>
    <style>
        body { margin: 0; font-family: sans-serif; text-align: center; background: #F0F8FF; }
        #top-area { background: #C8E6C9; padding: 10px; border-bottom: 3px solid #81C784; }
        #clock { font-size: 60px; font-weight: bold; color: #2E7D32; }
        #bottom-area { display: flex; height: calc(100vh - 100px); }
        .player-area { flex: 1; padding: 10px; display: flex; flex-direction: column; align-items: center; border-right: 1px solid #CCC; }
        .timer-display { font-size: 32px; font-weight: bold; color: #D32F2F; margin: 10px 0; }
        .task-title { font-size: 20px; font-weight: bold; height: 3em; }
        .img-box { height: 120px; display: flex; align-items: center; }
        .treasure-img { width: 140px; transition: width 0.2s; }
        .btn { background: #8BC34A; color: white; border: none; padding: 15px 30px; font-size: 24px; border-radius: 50px; box-shadow: 0 5px #689F38; }
        .btn:active { transform: translateY(3px); box-shadow: 0 2px #689F38; }
        .btn:disabled { background: #CCC; box-shadow: none; }
    </style>
</head>
<body>
    <div id="top-area"><div id="clock">00:00:00</div></div>
    <div id="bottom-area">
        <div class="player-area">
            <div>🌟 ちー 🌟</div>
            <div id="chee-score">0</div>
            <div class="timer-display" id="chee-timer">00:00</div>
            <div class="task-title" id="chee-task">-</div>
            <div class="img-box"><img id="chee-img" class="treasure-img" src="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='80' font-size='80'%3E🎁%3C/text%3E%3C/svg%3E"></div>
            <button class="btn" id="chee-btn" onclick="done('chee')">できた！</button>
            <button style="font-size:9px;margin-top:10px" onclick="reset('chee')">リセット</button>
        </div>
        <div class="player-area">
            <div>🌟 よっくん 🌟</div>
            <div id="yokkun-score">0</div>
            <div class="timer-display" id="yokkun-timer">00:00</div>
            <div class="task-title" id="yokkun-task">-</div>
            <div class="img-box"><img id="yokkun-img" class="treasure-img" src="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='80' font-size='80'%3E🎁%3C/text%3E%3C/svg%3E"></div>
            <button class="btn" id="yokkun-btn" onclick="done('yokkun')">できた！</button>
            <button style="font-size:9px;margin-top:10px" onclick="reset('yokkun')">リセット</button>
        </div>
    </div>
    <script>
        const list = [
            { t: "1) おきる！！", s: 300 },
            { t: "2) トイレ・おきがえ", s: 600 },
            { t: "3) ごはん たべる", s: 1200 },
            { t: "4) はみがき・かおあらい", s: 300 },
            { t: "5) じゅんび（カバン）", s: 300 },
            { t: "🌟 ぜんぶ かんりょう！", s: 1 }
        ];
        let state = { chee: { idx: 0, left: 300, total: 0 }, yokkun: { idx: 0, left: 300, total: 0 } };
        function save() { localStorage.setItem('kids_v3', JSON.stringify(state)); }
        function load() {
            const s = localStorage.getItem('kids_v3');
            if(s) state = JSON.parse(s);
            render('chee'); render('yokkun');
        }
        function render(k) {
            const p = state[k]; const t = list[p.idx];
            document.getElementById(k+'-task').innerText = t.t;
            const m = Math.floor(p.left/60); const s = p.left%60;
            document.getElementById(k+'-timer').innerText = m+':'+(s<10?'0':'')+s;
            document.getElementById(k+'-score').innerText = 'トータル: ' + p.total;
            document.getElementById(k+'-img').style.width = (p.idx >= list.length-1) ? '140px' : (140 * (p.left/t.s)) + 'px';
            const b = document.getElementById(k+'-btn');
            if(p.idx >= list.length-1) { b.innerText='完了！'; b.disabled=true; }
            else { b.innerText='できた！'; b.disabled=false; }
        }
        function done(k) {
            if(state[k].idx < list.length-1) {
                state[k].total += 10; state[k].idx++; state[k].left = list[state[k].idx].s;
                save(); render(k);
            }
        }
        function reset(k) {
            if(confirm('リセットしますか？')) {
                state[k] = { idx: 0, left: 300, total: 0 };
                save(); render(k);
            }
        }
        setInterval(() => {
            document.getElementById('clock').innerText = new Date().toTimeString().split(' ')[0];
            ['chee','yokkun'].forEach(k => {
                if(state[k].left > 0 && state[k].idx < list.length-1) { state[k].left--; render(k); }
            });
        }, 1000);
        window.onload = load;
    </script>
</body>
</html>
